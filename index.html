<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cassanova - Experience</title>
    <style>
        /* Estilo para deixar o fundo preto e centralizar tudo */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        /* AJUSTE DO NOME: Aqui ele fica menor para caber na tela */
        .brand-name {
            font-size: clamp(2.5rem, 12vw, 6rem); 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5rem;
            margin-bottom: 10px;
            width: 90%; /* Garante que não bata nas bordas */
        }

        /* TEXTO ARTÍSTICO: "A Grade que Canta" */
        .art-text {
            color: #ff0000; /* Vermelho artístico */
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            max-width: 80%;
            line-height: 1.6;
            letter-spacing: 1px;
            margin-top: 20px;
            font-style: italic;
            opacity: 0.8;
        }

        /* Estilo do Player de Áudio */
        audio {
            margin-top: 50px;
            filter: invert(1); /* Deixa o player branco para combinar */
            width: 280px;
        }
    </style>
</head>
<body>

    <h1 class="brand-name">CASSANOVA</h1>

    <div class="art-text">
        "Aprender a grade que canta é decifrar a geometria do som. <br>
        Onde o traço encontra o ritmo, a imagem ganha voz."
    </div>

    <audio controls>
        <source src="musica.mp3" type="audio/mpeg">
        Seu navegador não suporta o elemento de áudio.
    </audio>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASSANOVA // NEURAL_SIMBIOSIS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --primary: #3df2a4;
            --secondary: #004422;
            --bg: #020504;
            --error: #ff3333;
        }

        * { box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-transform: uppercase;
        }

        /* Camada de Filtro CRT/Glitch */
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 3px, 3px 100%;
            z-index: 100;
            pointer-events: none;
            opacity: 0.4;
        }

        /* Header Dinâmico */
        header {
            display: flex;
            justify-content: space-between;
            padding: 10px 30px;
            border-bottom: 1px solid var(--primary);
            background: rgba(0, 20, 10, 0.5);
            box-shadow: 0 0 20px var(--secondary);
        }

        .system-status { animation: blink 0.8s infinite; color: var(--error); }

        /* Grade Principal */
        main {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            flex-grow: 1;
            gap: 15px;
            padding: 15px;
            filter: url(#glitch); /* Aplica o filtro de glitch SVG */
        }

        .side-panel {
            border: 1px solid var(--secondary);
            background: rgba(0, 15, 8, 0.8);
            padding: 10px;
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .core-display {
            border: 2px solid var(--primary);
            position: relative;
            background: rgba(0, 0, 0, 0.9);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .main-visual {
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 30px var(--secondary);
            image-rendering: pixelated;
        }

        /* Janela de Log Flutuante */
        .log-window {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 300px;
            height: 150px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--primary);
            padding: 10px;
            font-size: 0.7rem;
            overflow-y: hidden;
        }

        /* Botões de Comando */
        .cmd-btn {
            background: var(--secondary);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px;
            width: 100%;
            text-align: left;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .cmd-btn:hover {
            background: var(--primary);
            color: var(--bg);
            box-shadow: 0 0 15px var(--primary);
        }

        /* Rodapé de Batimento Cardíaco */
        footer {
            height: 50px;
            border-top: 1px solid var(--primary);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 0.8rem;
        }

        .heart-rate { width: 100px; height: 30px; margin-left: 20px; }

        @keyframes blink { 50% { opacity: 0; } }

        /* Script de Carregamento */
        #boot-screen {
            position: fixed;
            top:0; left:0; width: 100%; height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }

        .loader { width: 0%; height: 2px; background: var(--primary); margin-top: 10px; transition: 2s; }
    </style>
</head>
<body onclick="startCore()">

    <svg style="display: none;">
        <defs>
            <filter id="glitch">
                <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="1" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" />
            </filter>
        </defs>
    </svg>

    <div id="boot-screen">
        <div id="boot-text">CARREGANDO CASSANOVA_CORE...</div>
        <div class="loader" id="loader-bar"></div>
    </div>

    <div class="crt-overlay"></div>

    <header>
        <div>NODE: ALPHA-7 // CASSANOVA</div>
        <div class="system-status">NEURAL_LINK: ACTIVE</div>
    </header>

    <main>
        <div class="side-panel">
            <div style="border-bottom: 1px solid var(--primary);">[BIOMETRICS]</div>
            <p>PULSE: 145 BPM</p>
            <p>SYNC: 92.4%</p>
            <p>O2: 12% [CRITICAL]</p>
            <hr style="border: 0.5px solid var(--secondary); width: 100%;">
            <img src="1000236841.jpg" alt="Mago" style="width: 100%; filter: grayscale(1) brightness(0.7) sepia(1) hue-rotate(90deg);">
            <p style="font-size: 0.6rem;">ENTITY_01: "THE MAGE"</p>
        </div>

        <div class="core-display">
            <img src="1000236854.png" id="main-image" class="main-visual" alt="Core View">
            
            <div class="log-window">
                <div style="border-bottom: 1px solid var(--primary); margin-bottom: 5px;">> LIVE_LOGS</div>
                <div id="log-text" style="line-height: 1.2;"></div>
            </div>
        </div>

        <div class="side-panel">
            <div style="border-bottom: 1px solid var(--primary);">[ARCHIVE]</div>
            <button class="cmd-btn" onclick="changeView('1000236854.png', 'Protocolo de Simbiose Completo.')">DEEP_CORE</button>
            <button class="cmd-btn" onclick="changeView('1000236843.gif', 'Conexão neural estabelecida no terminal.')">THE_INTERFACE</button>
            <button class="cmd-btn" onclick="changeView('1000236845.gif', 'Monitorando setor habitacional 404.')">HABITAT_VIEW</button>
            <button class="cmd-btn" onclick="changeView('1000236844.jpg', 'Unidades de defesa detectadas.')">DEFENSE_RECON</button>
            
            <div style="margin-top: auto; color: var(--primary); font-size: 0.7rem;">
                [!] AVISO: A DESCONEXÃO AGORA RESULTARÁ EM MORTE CEREBRAL.
            </div>
        </div>
    </main>

    <footer>
        <span>BGM: CALMA_PROFUNDA.WAV</span>
        <canvas id="heart-wave" class="heart-rate"></canvas>
        <audio id="bgm" loop>
            <source src="https://stream.zeno.fm/f3wvbb66v0duv" type="audio/mpeg">
        </audio>
    </footer>

    <script>
        // Simulação de Boot
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader-bar').style.width = '100%';
                setTimeout(() => {
                    document.getElementById('boot-screen').style.display = 'none';
                }, 2000);
            }, 500);
        };

        function startCore() {
            document.getElementById('bgm').play();
            addLog("Iniciando interface neural...");
            addLog("Conectando batimentos cardíacos...");
            drawHeartWave();
        }

        function changeView(img, text) {
            document.getElementById('main-image').src = img;
            addLog(text);
            playBeep();
        }

        function addLog(msg) {
            const log = document.getElementById('log-text');
            log.innerHTML += `> ${msg}<br>`;
            log.scrollTop = log.scrollHeight;
        }

        function playBeep() {
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.value = 1200;
            gain.gain.value = 0.05;
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.05);
        }

        // Desenha o gráfico de batimentos
        function drawHeartWave() {
            const canvas = document.getElementById('heart-wave');
            const ctx = canvas.getContext('2d');
            let x = 0;
            function animate() {
                ctx.fillStyle = 'rgba(2, 5, 4, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#3df2a4';
                ctx.beginPath();
                ctx.moveTo(x, canvas.height/2 + Math.sin(x*0.5)*10);
                x += 2;
                if(x > canvas.width) x = 0;
                ctx.lineTo(x, canvas.height/2 + Math.sin(x*0.5)*10);
                ctx.stroke();
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>

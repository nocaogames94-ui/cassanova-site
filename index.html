<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASSANOVA // NEURAL_BACKBONE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=VT323&display=swap');

        :root {
            --neon: #3df2a4;
            --neon-low: rgba(61, 242, 164, 0.15);
            --bg: #010a05;
            --glitch-red: rgba(255, 0, 80, 0.4);
            --glitch-blue: rgba(0, 255, 255, 0.4);
        }

        * { cursor: crosshair; box-sizing: border-box; outline: none; }

        body, html {
            background: var(--bg);
            color: var(--neon);
            font-family: 'Fira Code', monospace;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Efeito de Flicker e Scanlines */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            z-index: 1000;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.9; }
        }

        /* Layout Grid Avançado */
        #os-container {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            grid-template-rows: 60px 1fr 180px;
            height: 100vh;
            gap: 10px;
            padding: 10px;
            background: radial-gradient(circle at center, #051a10 0%, #010a05 100%);
        }

        header {
            grid-column: 1 / 4;
            border: 1px solid var(--neon);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: var(--neon-low);
            clip-path: polygon(0 0, 98% 0, 100% 30%, 100% 100%, 2% 100%, 0 70%);
        }

        .side-panel {
            border: 1px solid var(--neon-low);
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        /* Terminal de Logs Real-time */
        #kernel-logs {
            font-size: 0.7rem;
            padding: 10px;
            color: #2aa371;
            overflow-y: hidden;
            flex-grow: 1;
        }

        /* Área Central (Core) */
        #core-visual {
            grid-column: 2;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--neon);
            position: relative;
            overflow: hidden;
        }

        #main-display {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
            perspective: 1000px;
        }

        .pixel-image {
            max-width: 85%;
            max-height: 85%;
            border: 1px solid var(--neon);
            box-shadow: 0 0 40px var(--neon-low);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            image-rendering: pixelated;
        }

        .pixel-image:hover {
            transform: rotateY(10deg) rotateX(5deg) scale(1.05);
        }

        /* Barra de Arquivos Inferior */
        footer {
            grid-column: 1 / 4;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 15px;
            border: 1px solid var(--neon-low);
            align-items: center;
        }

        .file-thumb {
            min-width: 120px;
            height: 120px;
            border: 1px solid var(--neon-low);
            cursor: pointer;
            position: relative;
            filter: grayscale(1) contrast(1.2);
            transition: 0.3s;
        }

        .file-thumb:hover {
            filter: grayscale(0);
            border-color: var(--neon);
            transform: translateY(-5px);
        }

        .file-thumb span {
            position: absolute;
            bottom: 0; background: var(--neon);
            color: var(--bg);
            width: 100%; font-size: 0.6rem; text-align: center;
        }

        /* Animações de Glitch */
        .glitch-text {
            font-family: 'VT323';
            font-size: 1.8rem;
            position: relative;
            text-shadow: 0.05em 0 0 var(--glitch-red), -0.05em -0.025em 0 var(--glitch-blue);
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        /* Botão de Som */
        #audio-ctrl {
            background: var(--neon);
            color: var(--bg);
            border: none;
            padding: 5px 15px;
            font-family: 'VT323';
            font-weight: bold;
            cursor: pointer;
        }

    </style>
</head>
<body onclick="initAudio()">

    <div class="overlay"></div>

    <div id="os-container">
        <header>
            <div class="glitch-text">CASSANOVA_SYS_v.9.0.1</div>
            <div>STATUS: <span style="color: #fff; text-shadow: 0 0 10px #fff;">SYNCHRONIZED</span></div>
            <button id="audio-ctrl" onclick="toggleMute()">AUDIO: OFF</button>
        </header>

        <aside class="side-panel">
            <div style="background: var(--neon); color: var(--bg); padding: 5px; font-size: 0.7rem; font-weight: bold;">[ KERNEL_LOGS ]</div>
            <div id="kernel-logs"></div>
        </aside>

        <section id="core-visual">
            <div id="main-display">
                <img src="1000236854.png" class="pixel-image" id="active-view">
            </div>
            <div id="data-stream" style="height: 40px; border-top: 1px solid var(--neon-low); font-size: 0.8rem; padding: 10px; white-space: nowrap; overflow: hidden;">
                DEEP_LINK_ESTABLISHED // ASSIMILATING_NEURAL_DATA // %%%%%%
            </div>
        </section>

        <aside class="side-panel">
            <div style="background: var(--neon); color: var(--bg); padding: 5px; font-size: 0.7rem; font-weight: bold;">[ NEURAL_SYNC ]</div>
            <div style="padding: 15px; font-size: 0.9rem;">
                <p>BRAIN_FREQ: 14.5Hz</p>
                <div style="width: 100%; height: 5px; background: #111; border: 1px solid var(--neon);"><div id="sync-bar" style="width: 89%; height: 100%; background: var(--neon);"></div></div>
                <p>O2_LEVEL: 12%</p>
                <p>IDENTITY: CASSANOVA</p>
                <hr style="border-color: var(--neon-low);">
                <img src="1000236841.jpg" style="width: 100%; filter: hue-rotate(90deg) brightness(0.8);">
            </div>
        </aside>

        <footer>
            <div class="file-thumb" onclick="updateView('1000236854.png', 'PROTOCOL_SIMBIOSIS')">
                <img src="1000236854.png" width="120" height="120">
                <span>CORE.SYS</span>
            </div>
            <div class="file-thumb" onclick="updateView('1000236843.gif', 'USER_TERMINAL_LINK')">
                <img src="1000236843.gif" width="120" height="120">
                <span>LINK.GIF</span>
            </div>
            <div class="file-thumb" onclick="updateView('1000236842.jpg', 'ELEVATION_CHAMBER')">
                <img src="1000236842.jpg" width="120" height="120">
                <span>ASCEND.DAT</span>
            </div>
            <div class="file-thumb" onclick="updateView('1000236859.jpg', 'OPTIC_RECON')">
                <img src="1000236859.jpg" width="120" height="120">
                <span>EYE_01.IMG</span>
            </div>
             <div class="file-thumb" onclick="updateView('1000236860.jpg', 'ENTITY_RECON')">
                <img src="1000236860.jpg" width="120" height="120">
                <span>UNKNOWN.FILE</span>
            </div>
        </footer>
    </div>

    <audio id="bgm" loop>
        <source src="https://www.soundjay.com/free-music/ambient-01.mp3" type="audio/mpeg">
    </audio>

    <script>
        const logsContainer = document.getElementById('kernel-logs');
        const syncBar = document.getElementById('sync-bar');
        const bgm = document.getElementById('bgm');
        let audioActive = false;

        // Gerador de Logs Infinitos
        const logMessages = [
            "Assimilando pacotes...",
            "Fragmento de memória recuperado.",
            "CUIDADO: Temperatura do Core subindo.",
            "Injetando código no setor 0x44.",
            "Conexão neural estável em 89%.",
            "Ignorando firewall governamental...",
            "Cassanova detectado na sub-rede."
        ];

        function addLog() {
            const line = document.createElement('div');
            line.textContent = `[${new Date().toLocaleTimeString()}] ${logMessages[Math.floor(Math.random() * logMessages.length)]}`;
            logsContainer.prepend(line);
            if (logsContainer.childNodes.length > 25) logsContainer.lastChild.remove();
        }
        setInterval(addLog, 1500);

        // Flutuação de Sincronia
        setInterval(() => {
            const pulse = 85 + Math.random() * 10;
            syncBar.style.width = pulse + "%";
        }, 3000);

        // Audio System
        function initAudio() {
            if(!audioActive) {
                bgm.volume = 0.4;
                bgm.play();
                document.getElementById('audio-ctrl').textContent = "AUDIO: ON";
                audioActive = true;
                addLog("AUDIO_ENGINE_LOADED");
            }
        }

        function toggleMute() {
            if (bgm.paused) {
                bgm.play();
                document.getElementById('audio-ctrl').textContent = "AUDIO: ON";
            } else {
                bgm.pause();
                document.getElementById('audio-ctrl').textContent = "AUDIO: OFF";
            }
            playSfx(800, 0.1);
        }

        // SFX Procedural (Beep)
        function playSfx(freq, dur) {
            if(!audioActive) return;
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.value = freq;
            gain.gain.value = 0.05;
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + dur);
        }

        function updateView(src, label) {
            const img = document.getElementById('active-view');
            img.style.opacity = 0;
            setTimeout(() => {
                img.src = src;
                img.style.opacity = 1;
                addLog(`MOUNTING_VIEW: ${label}`);
                playSfx(440, 0.05);
            }, 200);
        }

        // Data Stream Animation
        const stream = document.getElementById('data-stream');
        setInterval(() => {
            stream.textContent += " " + Math.random().toString(16).substr(2, 8).toUpperCase();
            if(stream.textContent.length > 100) stream.textContent = "STREAM_RESET // ";
        }, 100);

    </script>
</body>
</html>
